name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 is pinned on purpose: the AppImage toolchain is flaky on
        # the newer ubuntu-latest (24.04) image, which is what intermittently
        # failed the Linux job while Windows/macOS passed.
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Stagger so the three matrix jobs do not race to create the same GitHub
      # release; the loser of that race is what intermittently fails one OS.
      # Windows creates the release first, the others upload to it.
      - name: Stagger publish
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest) sleep 0 ;;
            macos-latest) sleep 30 ;;
            *) sleep 60 ;;
          esac

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RT_GOOGLE_CLIENT_SECRET: ${{ secrets.RT_GOOGLE_CLIENT_SECRET }}
        run: npx electron-builder --publish always
